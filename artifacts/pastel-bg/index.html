<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Benja Hex</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>

    <!-- ── Background ─────────────────────────── -->
    <div class="scene">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
      <div class="blob blob-3"></div>
      <div class="blob blob-4"></div>
      <div class="blob blob-5"></div>
      <div class="blob blob-6"></div>
      <div class="grid-overlay"></div>
      <canvas id="sparkCanvas"></canvas>
    </div>

    <!-- ── App ────────────────────────────────── -->
    <div class="app-wrap">

      <!-- HEADER -->
      <header class="site-header">
        <div class="brand">
          <span class="brand-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
              <polygon points="12,2 22,8 22,16 12,22 2,16 2,8" stroke="url(#hg)" stroke-width="1.5" fill="none"/>
              <circle cx="12" cy="12" r="3" fill="url(#hg2)"/>
              <defs>
                <linearGradient id="hg" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#5bc8ff"/>
                  <stop offset="100%" stop-color="#b57fff"/>
                </linearGradient>
                <linearGradient id="hg2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#5bc8ff"/>
                  <stop offset="100%" stop-color="#ff6fcf"/>
                </linearGradient>
              </defs>
            </svg>
          </span>
          <span class="brand-benja">BENJA</span>
          <span class="brand-sep">✦</span>
          <span class="brand-hex">HEX</span>
        </div>

        <div class="header-controls">
          <button class="ctrl-btn" id="cursorToggleBtn" title="Toggle Cursor">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M4.5 3.88l4.432 14.382.925-4.463 4.896 4.896 1.414-1.414-4.896-4.896 4.463-.925L4.5 3.88z"/>
            </svg>
          </button>
          <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen">
            <svg id="fsIcon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- MAIN LAYOUT -->
      <div class="main-layout">

        <!-- LEFT -->
        <div class="left-col">

          <div class="glass-panel">
            <h2 class="panel-title">𝐘𝐎𝐔𝐑 𝐁𝐈𝐎</h2>

            <div class="fmt-row">
              <button class="fmt-btn" data-tag="[b]">Bold <span class="tag-pill">[b]</span></button>
              <button class="fmt-btn" data-tag="[i]">Italic <span class="tag-pill">[i]</span></button>
              <button class="fmt-btn" data-tag="[b][i]">Bold+Italic <span class="tag-pill">[b][i]</span></button>
            </div>

            <p class="section-label">𝐏𝐈𝐂𝐊 𝐀 𝐂𝐎𝐋𝐎𝐑 𝐓𝐀𝐆</p>
            <div class="color-grid" id="colorGrid"></div>

            <textarea id="bioInput" class="bio-textarea" maxlength="180"
              placeholder="e.g. [FF0000]Pro Player [b]Squad Up" disabled></textarea>

            <div class="bio-footer-row">
              <span class="popular-row">
                Popular:
                <span class="pop-char" data-char="★">★</span>
                <span class="pop-char" data-char="♛">♛</span>
                <span class="pop-char" data-char="♚">♚</span>
                <span class="pop-char" data-char="♥">♥</span>
                <span class="pop-char" data-char="✖">✖</span>
              </span>
              <span id="charCount" class="char-count">0/180</span>
            </div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">𝐋𝐈𝐕𝐄 𝐏𝐑𝐄𝐕𝐈𝐄𝐖</h3>
            <div id="livePreview" class="preview-box">
              <span class="preview-placeholder">Bio preview will appear here…</span>
            </div>
          </div>

          <div class="glass-panel">
            <h3 class="panel-title">𝐔𝐏𝐃𝐀𝐓𝐄 𝐋𝐎𝐍𝐆 𝐁𝐈𝐎</h3>

            <label class="field-label">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
              𝐀𝐂𝐂𝐄𝐒𝐒 𝐓𝐎𝐊𝐄𝐍
            </label>
            <input type="text" id="accessToken" class="token-input"
              placeholder="Enter your FF Access Token" disabled />
            <div class="field-err hidden" id="tokenErr">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
              Access Token is required
            </div>
            <div class="field-err hidden" id="bioErr">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
              Bio cannot be empty
            </div>

            <button id="updateBtn" class="update-btn" disabled>
              <svg id="btnSpinner" class="spin hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
              </svg>
              <span id="btnLabel">𝐔𝐩𝐝𝐚𝐭𝐞 𝐁𝐢𝐨</span>
            </button>
          </div>

        </div>

        <!-- RIGHT: Console -->
        <div class="right-col">
          <div class="console-card">
            <div class="console-titlebar">
              <span class="con-dots">
                <span class="cdot cdot-r"></span>
                <span class="cdot cdot-y"></span>
                <span class="cdot cdot-g"></span>
              </span>
              <span class="con-label">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zm-1 13H5V7h14v10z"/><path d="M6 10l2 2-2 2h3v-1H7.41L9 11.41 7.41 10H9V9H6v1zm4 3h5v-1h-5v1z"/></svg>
                𝐂𝐎𝐍𝐒𝐎𝐋𝐄
              </span>
              <button class="con-clear" id="clearConsole" title="Clear">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M19 4h-3.5l-1-1h-5l-1 1H5v2h14V4zM6 19a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V7H6v12z"/></svg>
              </button>
            </div>
            <div id="consoleLog" class="console-body"></div>
          </div>
        </div>

      </div>

      <!-- Footer -->
      <footer class="site-footer">
        <a href="https://youtube.com/@benjahexofficial?si=PZc7gYBLQe5F9GX7"
           target="_blank" rel="noopener" class="foot-link yt">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/>
          </svg>
          YouTube
        </a>
        <a href="https://discord.gg/9MuK9waCjs"
           target="_blank" rel="noopener" class="foot-link dc">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057c.002.022.013.043.031.057a19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128c.126-.094.252-.192.372-.292a.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.1.246.198.373.292a.077.077 0 0 1-.006.127c-.598.35-1.22.645-1.873.892a.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/>
          </svg>
          Discord
        </a>
      </footer>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
      <span class="toast-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
      </span>
      <div class="toast-text">
        <span class="toast-title">This Action Is Denied</span>
        <span class="toast-sub">By Benja Hex</span>
      </div>
    </div>

    <!-- Cursor -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-ring" id="cursorRing"></div>

    <script src="index.js"></script>
  </body>
</html>
