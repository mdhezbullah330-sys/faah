kind = "web"
previewPath = "/"
title = "Pastel Background"
version = "1.0.0"
id = "artifacts/pastel-bg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24598

[services.development]
run = "pnpm --filter @workspace/pastel-bg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pastel-bg", "run", "build" ]
publicDir = "artifacts/pastel-bg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24598"
BASE_PATH = "/"
